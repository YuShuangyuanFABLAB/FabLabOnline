upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# 全局限流
limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
# 事件上报限流
limit_req_zone $binary_remote_addr zone=events:10m rate=100r/m;
# 登录二维码限流
limit_req_zone $binary_remote_addr zone=qrcode:10m rate=1r/m;

server {
    listen 80;
    server_name _;

    # ─── 安全头 ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── 前端静态文件 ───
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 登录二维码 — 严格限流 ───
    location /api/v1/auth/qrcode {
        limit_req zone=qrcode burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 事件上报 — 独立限流 ───
    location /api/v1/events/ {
        limit_req zone=events burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API 反向代理 — 全局限流 ───
    location /api/ {
        limit_req zone=global burst=30 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 健康检查 ───
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── 就绪检查 + 指标（内部用）───
    location /ready {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        allow 127.0.0.1;
        deny all;
    }

    location /metrics {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        allow 127.0.0.1;
        deny all;
    }

    # ─── ACME 证书验证（备案后启用 HTTPS）───
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
